name: Deploy Portfolio

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Groq API key
        run: |
          sed -i "s|%GROQ_API_KEY%|${{ secrets.GROQ_API_KEY }}|g" index.html
          echo "Key injection done"
          grep -c "%GROQ_API_KEY%" index.html && echo "WARNING: placeholder still present" || echo "OK: placeholder replaced"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .